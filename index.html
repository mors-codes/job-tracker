<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="container">

        <header>
            <h1>Job Tracker</h1>
            <p>Log your applications and stay on top of your search.</p>
        </header>

        <form id="job-form" novalidate>

            <!-- Row 1: Company + Role -->
            <div class="field">
                <label for="company">Company Name</label>
                <input type="text" id="company" name="company" placeholder="e.g. Acme Corp" />
            </div>

            <div class="field">
                <label for="role">Job Role</label>
                <input type="text" id="role" name="role" placeholder="e.g. Frontend Developer" />
            </div>

            <!-- Row 2: URL (full width) -->
            <div class="field field-full">
                <label for="url">Job Posting URL</label>
                <input type="url" id="url" name="url" placeholder="https://..." />
            </div>

            <!-- Row 3: Date + Status -->
            <div class="field">
                <label for="date">Date Applied</label>
                <input type="date" id="date" name="date" />
            </div>

            <div class="field">
                <label for="status">Application Status</label>
                <select id="status" name="status">
                    <option value="">-- Select a status --</option>
                    <option value="Applied">Applied</option>
                    <option value="Interview">Interview</option>
                    <option value="Rejected">Rejected</option>
                    <option value="Offer">Offer</option>
                </select>
            </div>

            <!-- Row 4: Notes (full width) -->
            <div class="field field-full">
                <label for="notes">Notes <span class="optional">(optional)</span></label>
                <textarea id="notes" name="notes" placeholder="Anything worth remembering..."></textarea>
            </div>

            <!-- Row 5: Email (full width) -->
            <div class="field field-full">
                <label for="email">Your Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" />
            </div>

            <!-- Submit -->
            <button type="submit" id="submit-btn">Submit Application</button>

            <!-- Status Messages -->
            <div id="msg-loading" class="message" hidden>Sending...</div>
            <div id="msg-success" class="message" hidden>Application logged successfully!</div>
            <div id="msg-error" class="message" hidden>Something went wrong. Please try again.</div>

        </form>

    </div>

    <script src="script.js"></script>
</body>

</html>
